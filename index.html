<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시재금 계산기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator {
            background-color: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .row label {
            width: 80px;
            font-weight: bold;
            color: #555;
        }
        .row input {
            width: 80px;
            padding: 5px;
            text-align: right;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .row .amount {
            width: 100px;
            text-align: right;
            color: #666;
        }
        .divider {
            height: 1px;
            background-color: #ddd;
            margin: 15px 0;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            color: #0056b3;
            margin-bottom: 10px;
        }
        .target-row input {
            width: 120px;
            font-size: 1em;
            color: #d9534f;
            border: 1px solid #d9534f;
        }
        .diff-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 15px;
            padding: 10px;
            background-color: #f9f9f9;
            border-radius: 5px;
        }
        .diff-plus { color: #0056b3; }
        .diff-minus { color: #d9534f; }
    </style>
</head>
<body>

<div class="calculator">
    <h2>💰 시재금 계산기</h2>

    <div id="inputs"></div>

    <div class="divider"></div>

    <div class="total-row">
        <span>현재 현금 총액:</span>
        <span id="total-cash">0원</span>
    </div>

    <div class="row target-row">
        <label>장부상 시재:</label>
        <input type="number" id="target-amount" value="0" min="0" oninput="calculate()">
        <span style="width: 30px; text-align: right;">원</span>
    </div>

    <div class="diff-row" id="diff-container">
        <span>시재 차이:</span>
        <span id="diff-amount">0원</span>
    </div>
</div>

<script>
    const denominations = [50000, 10000, 5000, 1000, 500, 100, 50, 10];
    const inputsContainer = document.getElementById('inputs');

    // 입력 필드 생성
    denominations.forEach(unit => {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `
            <label>${unit.toLocaleString()}원</label>
            <input type="number" id="qty-${unit}" value="" min="0" placeholder="0개" oninput="calculate()">
            <div class="amount" id="amt-${unit}">0원</div>
        `;
        inputsContainer.appendChild(row);
    });

    // 계산 로직
    function calculate() {
        let totalCash = 0;

        denominations.forEach(unit => {
            const qty = parseInt(document.getElementById(`qty-${unit}`).value) || 0;
            const amount = unit * qty;
            totalCash += amount;
            document.getElementById(`amt-${unit}`).innerText = amount.toLocaleString() + '원';
        });

        document.getElementById('total-cash').innerText = totalCash.toLocaleString() + '원';

        const targetAmount = parseInt(document.getElementById('target-amount').value) || 0;
        const diffAmount = totalCash - targetAmount;
        const diffElement = document.getElementById('diff-amount');
        const diffContainer = document.getElementById('diff-container');

        if (diffAmount > 0) {
            diffElement.innerText = '+' + diffAmount.toLocaleString() + '원 (남음)';
            diffElement.className = 'diff-plus';
        } else if (diffAmount < 0) {
            diffElement.innerText = diffAmount.toLocaleString() + '원 (부족)';
            diffElement.className = 'diff-minus';
        } else {
            diffElement.innerText = '0원 (일치)';
            diffElement.className = '';
        }
    }
</script>

</body>
</html>
